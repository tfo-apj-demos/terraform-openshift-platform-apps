kind: VaultAuth
apiVersion: secrets.hashicorp.com/v1beta1
metadata:
  name: vaultauth-keycloak
  namespace: keycloak
spec:
  vaultConnectionRef: vaultconnection-gcve
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: keycloak
    serviceAccount: vault-auth
    audiences:
      - https://kubernetes.default.svc
