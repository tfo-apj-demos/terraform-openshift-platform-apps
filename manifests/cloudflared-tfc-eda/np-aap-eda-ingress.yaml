apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: aap-eda-activation-from-cloudflared-only
  namespace: aap
  labels:
    app.kubernetes.io/managed-by: terraform
    app.kubernetes.io/part-of: tfc-eda-tunnel
  annotations:
    description: |
      Restricts TCP/5004 ingress on AAP-EDA rulebook activation pods to traffic
      originating from the cloudflared-tfc-eda namespace only. Closes the
      in-cluster bypass where any pod could curl
      tfc-notification-drift.aap.svc.cluster.local:5004 directly without
      transiting the Cloudflare tunnel.
spec:
  # AAP-EDA labels its Job-managed activation pods with app=eda. The Job name
  # changes on every activation restart, but `app=eda` is stable, so this policy
  # follows the current pod automatically.
  podSelector:
    matchLabels:
      app: eda
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cloudflared-tfc-eda
      ports:
        - protocol: TCP
          port: 5004
