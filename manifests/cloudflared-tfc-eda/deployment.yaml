apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: cloudflared-tfc-eda
  labels:
    app.kubernetes.io/name: cloudflared
    app.kubernetes.io/component: tfc-eda-tunnel
spec:
  # Quick tunnels are per-pod (each replica would get its own *.trycloudflare.com URL).
  # Keep replicas=1 so we have a single, discoverable URL.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudflared
      app.kubernetes.io/component: tfc-eda-tunnel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudflared
        app.kubernetes.io/component: tfc-eda-tunnel
    spec:
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          # Quick-tunnel (TryCloudflare) mode: anonymous, no token required.
          # Cloudflare issues an ephemeral https://<random>.trycloudflare.com URL,
          # printed to stdout once the tunnel establishes. URL changes on every
          # pod restart -- discover via `kubectl -n cloudflared-tfc-eda logs deploy/cloudflared | grep trycloudflare.com`.
          args:
            - tunnel
            - --no-autoupdate
            - --url
            - http://tfc-notification-drift.aap.svc.cluster.local:5004
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 2000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
